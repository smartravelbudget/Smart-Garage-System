<!DOCTYPE html>
<html>
<head>
    <title>Smart Garage - Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">
    <h1>🚗 Smart Garage</h1>
    <h3>Register</h3>

    <input type="text" id="regUsername" placeholder="Enter Username">
    <input type="password" id="regPassword" placeholder="Enter Password">
    <input type="password" id="regConfirmPassword" placeholder="Confirm Password">

    <button type="button" id="registerBtn">Register</button>

    <p>Already have an account?
        <button type="button" id="backToLogin">Login here</button>
    </p>
</div>

<script>

window.onload = function(){

document.getElementById("registerBtn").addEventListener("click", function() {

    const username = document.getElementById("regUsername").value.trim();
    const password = document.getElementById("regPassword").value;
    const confirm = document.getElementById("regConfirmPassword").value;

    if (!username || !password || !confirm) {
        alert("Fill all fields!");
        return;
    }

    if (password !== confirm) {
        alert("Passwords do not match!");
        return;
    }

    let users = JSON.parse(localStorage.getItem("users")) || [];

    if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
        alert("Username already exists!");
        return;
    }

    users.push({ username, password });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration successful!");
    window.location.href = "login.html";
});

document.getElementById("backToLogin").addEventListener("click", function() {
    window.location.href = "login.html";
});

}

</script>

</body>
</html>
